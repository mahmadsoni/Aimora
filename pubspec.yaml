name: aimora
description: "AIMORA — Precision Crosshair Overlay for Gamers. Production-ready Android overlay app built with Flutter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # UI / Theming / Typography
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  dynamic_color: ^1.7.0
  flex_color_picker: ^3.5.1

  # Localization
  easy_localization: ^3.0.7

  # Local storage (offline-first, no code-gen required)
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3

  # Android system overlay (draw over other apps)
  flutter_overlay_window: ^0.4.5

  # Permissions
  permission_handler: ^11.3.1

  # Utils
  uuid: ^4.4.0
  intl: ^0.19.0
  flutter_svg: ^2.0.10+1
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/lang/
    - assets/icons/

  # Custom fonts are resolved through google_fonts at runtime (no bundled
  # font files required), keeping the repository lightweight.
